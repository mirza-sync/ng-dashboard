<header
  class="bg-black text-gray-600 flex justify-between items-center px-8 py-2"
>
  <h1 class="text-xl">Dashboard</h1>
  <button (click)="logout()">Sign Out</button>
</header>

<div class="p-8">
  <h2 class="text-xl mb-2">Overview</h2>
  <div class="flex justify-center items-center gap-5">
    <div class="w-1/2">
      <div class="border border-gray-300 rounded-md overflow-hidden">
        <div class="text-lg bg-gray-100 p-4">Amount of Doughnut Eaten</div>
        <div class="h-[300px] py-8">
          <canvas #donutCanvas></canvas>
        </div>
      </div>
    </div>

    <div class="w-1/2">
      <div class="border border-gray-300 rounded-md overflow-hidden">
        <div class="text-lg bg-gray-100 p-4">Revenue</div>
        <div class="h-[300px] p-4">
          <canvas #barCanvas></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-8">
    <h2 class="text-xl mb-2">User List</h2>
    <table class="text-center w-full">
      <thead>
        <tr class="bg-gray-100">
          <th class="border px-4 py-2">#</th>
          <th class="border px-4 py-2">First Name</th>
          <th class="border px-4 py-2">Last Name</th>
          <th class="border border-r-0 px-4 py-2">Username</th>
          <th class="border border-l-0 w-2/5"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of tableData; let i = index">
          <td class="border px-4 py-2">{{ i + 1 }}</td>
          <td class="border px-4 py-2">{{ user.firstName }}</td>
          <td class="border px-4 py-2">{{ user.lastName }}</td>
          <td class="border border-r-0 px-4 py-2">{{ user.username }}</td>
          <td class="border border-l-0"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
